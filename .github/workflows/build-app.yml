name: Build application

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: SunSet-macOS
            artifact_path: dist/SunSet.app
          - os: windows-latest
            artifact_name: SunSet-Windows
            artifact_path: dist/SunSet

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build application
        run: uv run python scripts/build_app.py

      - name: Archive macOS application
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/SunSet.app SunSet-macOS.zip

      - name: Archive Windows application
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/SunSet -DestinationPath SunSet-Windows.zip

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: SunSet-macOS
          path: SunSet-macOS.zip

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SunSet-Windows
          path: SunSet-Windows.zip
